<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHA1 File Hash Checker — Free Online DevTool</title>
<meta name="description" content="Compute SHA1 file hash. Drag and drop any file to verify its SHA-1 checksum. For text input, use the text version.">
<link rel="canonical" href="https://fulankizao.github.io/devtools/sha1-file.html"><link rel="stylesheet" href="style.css">
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"SHA1 File Hash Checker","url":"https://fulankizao.github.io/devtools/sha1-file.html","applicationCategory":"DeveloperApplication"}</script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙</text></svg>"></head>
<body><header class="site-header"><div class="container"><a href="/devtools/" class="logo">Dev<span>Tools</span></a><nav><a href="index.html">All Tools</a></nav></div></header>
<div class="tool-page"><h1>SHA1 File Hash Checker</h1><p class="subtitle">Compute SHA-1 hash for any file. Drop a file to verify its checksum. All processing happens in your browser.</p>
<div class="tool-box" style="text-align:center;padding:30px;border:2px dashed var(--border);" id="dz" ondragover="event.preventDefault();this.style.borderColor='var(--accent)';" ondrop="event.preventDefault();handleF(event.dataTransfer.files[0]);">
<p style="color:var(--text-muted);">Drop a file here or <a href="#" onclick="document.getElementById('fi').click();return false;" style="color:var(--accent);">browse</a></p>
<input type="file" id="fi" onchange="handleF(this.files[0])" style="display:none;"></div>
<div class="tool-box" id="res" style="display:none;"><div id="fn" style="font-family:var(--mono);font-size:0.85rem;margin-bottom:8px;"></div>
<label>SHA1 Hash</label><div id="ho" class="output-box" style="font-size:0.8rem;word-break:break-all;"></div>
<div class="tool-actions"><button class="btn btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('ho').textContent);this.textContent='Copied!';setTimeout(()=>this.textContent='Copy Hash',1500);">Copy Hash</button>
<button class="btn btn-danger btn-sm" onclick="resetF()">Select Another File</button></div></div>
<div class="related-links-box"><div class="related-links" style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;font-size:0.85rem;">
<a href="sha256-file.html">SHA256 File</a><a href="sha512-file.html">SHA512 File</a><a href="md5-file.html">MD5 File</a><a href="sha1.html">SHA1 Text</a></div></div></div>
<footer class="site-footer"><div class="container"><p>&copy; 2026 DevTools</p></div></footer>
<script>
async function handleF(f){if(!f)return;var a=await f.arrayBuffer();var h=await crypto.subtle.digest('SHA-1',a);
var hex=Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
document.getElementById('dz').style.display='none';document.getElementById('res').style.display='block';
document.getElementById('fn').textContent='📄 '+f.name+' ('+(f.size/1024).toFixed(1)+' KB)';document.getElementById('ho').textContent=hex;}
function resetF(){document.getElementById('dz').style.display='block';document.getElementById('res').style.display='none';document.getElementById('fi').value='';}
</script></body></html>
