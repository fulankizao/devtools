<script>
function previewMD(){var s=document.getElementById('mdi').value;var o=document.getElementById('mdo');
var h=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');
h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');
h=h.replace(/`(.+?)`/g,'<code>$1</code>');
h=h.replace(/^- (.+)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>
?)+/g,'<ul>$&</ul>');
h=h.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
h=h.replace(/`{3}(\w*)
([\s\S]*?)`{3}/g,'<pre><code>$2</code></pre>');
h=h.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
h=h.replace(/!\[(.+?)\]\((.+?)\)/g,'<img src="$2" alt="$1" style="max-width:100%;">');
h=h.replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
h=h.replace(/\n/g,'<br>');
o.innerHTML=h;}
function copyMD(){var t=document.getElementById('mdo').innerHTML;if(!t)return;navigator.clipboard.writeText(t);}
previewMD();
</script></body></html>
