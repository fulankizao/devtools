<body><header class="site-header"><div class="container"><a href="/devtools/" class="logo">Dev<span>Tools</span></a><nav><a href="index.html">All Tools</a></nav></div></header>
<div class="tool-page"><h1>Lorem Ipsum Generator</h1><p class="subtitle">Generate placeholder text for your designs and layouts. All generated in your browser.</p>
<div class="tool-box"><div class="options-row">
<label>Generate: <select id="lip-mode" onchange="genLIP()" style="padding:4px 8px;border:1px solid var(--border);border-radius:4px;">
<option value="paragraphs">Paragraphs</option><option value="words">Words</option><option value="bytes">Bytes</option></select></label>
<label>Count: <input type="number" id="lip-count" value="3" min="1" max="100" onchange="genLIP()" style="width:60px;padding:4px 8px;text-align:center;"></label>
</div>
<div class="tool-actions"><button class="btn btn-primary" onclick="genLIP()">Generate</button><button class="btn" onclick="copyLIP()">Copy All</button></div>

<script>
var LIP_WORDS='Lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua'.split(' ');
var LIP_SENTENCES=['Lorem ipsum dolor sit amet, consectetur adipiscing elit.','Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.','Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris.','Duis aute irure dolor in reprehenderit in voluptate velit esse cillum.','Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia.','Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit.','Sed quia consequuntur magni dolores eos qui ratione voluptatem sequi nesciunt.','At vero eos et accusamus et iusto odio dignissimos ducimus qui blanditiis.'];
function genLIP(){var m=document.getElementById('lip-mode').value;var n=parseInt(document.getElementById('lip-count').value)||3;var out='';
if(m==='paragraphs'){for(var i=0;i<n;i++){var p='';var s=2+Math.floor(Math.random()*4);for(var j=0;j<s;j++)p+=LIP_SENTENCES[Math.floor(Math.random()*LIP_SENTENCES.length)]+' ';out+=p.trim()+'

';}}
else if(m==='words'){for(var i=0;i<n;i++)out+=LIP_WORDS[Math.floor(Math.random()*LIP_WORDS.length)]+' ';}
else{var txt='';while(txt.length<n){txt+=LIP_WORDS[Math.floor(Math.random()*LIP_WORDS.length)]+' ';}out=txt.slice(0,n);}
document.getElementById('lip-out').textContent=out.trim();}
function copyLIP(){var t=document.getElementById('lip-out').textContent;if(!t||t.startsWith('Click'))return;navigator.clipboard.writeText(t);}
genLIP();
</script></body></html>
