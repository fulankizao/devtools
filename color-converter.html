<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Converter (HEX ↔ RGB ↔ HSL) — Free Online DevTool</title>
  <meta name="description" content="Free online color converter. Convert between HEX, RGB, and HSL color formats instantly. Pick colors visually and get the code.">
  <link rel="canonical" href="https://fulankizao.github.io/devtools/color-converter.html">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Color Converter","url":"https://fulankizao.github.io/devtools/color-converter.html","applicationCategory":"DeveloperApplication","operatingSystem":"All"}</script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙</text></svg>">
  <style>.cpicker{width:80px;height:80px;border:none;cursor:pointer;border-radius:8px;padding:0;border:2px solid var(--border)}</style>
</head>
<body>
  <header class="site-header"><div class="container"><a href="/devtools/" class="logo">Dev<span>Tools</span></a><nav><a href="index.html">All Tools</a></nav></div></header>
  <div class="tool-page">
    <h1>Color Converter</h1>
    <p class="subtitle">Convert between HEX, RGB, and HSL color formats. Pick a color visually and get instant conversions.</p>
    <div class="tool-box" style="text-align:center;padding:20px;">
      <input type="color" id="color-picker" class="cpicker" value="#3b82f6" oninput="updateFromPicker()">
      <div style="margin-top:8px;font-size:0.85rem;color:var(--text-muted);">Click to pick a color</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
      <div class="tool-box">
        <label>HEX</label>
        <input type="text" id="hex-input" value="#3b82f6" oninput="updateFromHEX()" style="font-family:var(--mono);font-size:1.1rem;text-align:center;">
      </div>
      <div class="tool-box">
        <label>RGB</label>
        <input type="text" id="rgb-input" value="rgb(59,130,246)" oninput="updateFromRGB()" style="font-family:var(--mono);font-size:0.9rem;text-align:center;">
      </div>
      <div class="tool-box">
        <label>HSL</label>
        <input type="text" id="hsl-input" value="hsl(217,91%,60%)" oninput="updateFromHSL()" style="font-family:var(--mono);font-size:0.9rem;text-align:center;">
      </div>
    </div>
    <div class="tool-box" style="text-align:center;">
      <div style="width:100%;height:120px;border-radius:8px;background:#3b82f6;border:1px solid var(--border);" id="color-preview"></div>
      <div style="margin-top:8px;font-size:0.85rem;color:var(--text-muted);">Preview</div>
    </div>
    <div class="related-links-box"><div class="related-links" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:0.85rem;">
      <a href="sha256.html">SHA256 Hash</a><a href="base64.html">Base64</a><a href="hex.html">HEX Encode</a>
    </div></div>
  </div>
  <footer class="site-footer"><div class="container"><p>&copy; 2026 DevTools</p></div></footer>
  <script>
  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return {r,g,b};
  }
  function rgbToHsl(r,g,b) {
    r/=255;g/=255;b/=255;var max=Math.max(r,g,b),min=Math.min(r,g,b),h,s,l=(max+min)/2;
    if(max===min){h=s=0}else{var d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);
      switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;}
    }
    return {h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
  }
  function hslToRgb(h,s,l){
    s/=100;l/=100;var c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2,r,g,b;
    if(h<60){r=c;g=x;b=0}else if(h<120){r=x;g=c;b=0}else if(h<180){r=0;g=c;b=x}else if(h<240){r=0;g=x;b=c}else if(h<300){r=x;g=0;b=c}else{r=c;g=0;b=x}
    return {r:Math.round((r+m)*255),g:Math.round((g+m)*255),b:Math.round((b+m)*255)};
  }
  function updateFromPicker(){
    var hex=document.getElementById('color-picker').value;
    document.getElementById('hex-input').value=hex;
    var rgb=hexToRgb(hex);document.getElementById('rgb-input').value='rgb('+rgb.r+','+rgb.g+','+rgb.b+')';
    var hsl=rgbToHsl(rgb.r,rgb.g,rgb.b);document.getElementById('hsl-input').value='hsl('+hsl.h+','+hsl.s+'%,'+hsl.l+'%)';
    document.getElementById('color-preview').style.background=hex;
  }
  function updateFromHEX(){
    var hex=document.getElementById('hex-input').value.trim();
    if(!/^#[0-9a-f]{6}$/i.test(hex)&&!/^#[0-9a-f]{3}$/i.test(hex))return;
    if(hex.length===4){hex='#'+hex[1]+hex[1]+hex[2]+hex[2]+hex[3]+hex[3]}
    document.getElementById('color-picker').value=hex;
    var rgb=hexToRgb(hex);document.getElementById('rgb-input').value='rgb('+rgb.r+','+rgb.g+','+rgb.b+')';
    var hsl=rgbToHsl(rgb.r,rgb.g,rgb.b);document.getElementById('hsl-input').value='hsl('+hsl.h+','+hsl.s+'%,'+hsl.l+'%)';
    document.getElementById('color-preview').style.background=hex;
  }
  function updateFromRGB(){
    var val=document.getElementById('rgb-input').value.trim();
    var m=val.match(/rgb\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)/);
    if(!m)return;var r=parseInt(m[1]),g=parseInt(m[2]),b=parseInt(m[3]);
    if(r>255||g>255||b>255)return;
    var hex='#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
    document.getElementById('hex-input').value=hex;document.getElementById('color-picker').value=hex;
    var hsl=rgbToHsl(r,g,b);document.getElementById('hsl-input').value='hsl('+hsl.h+','+hsl.s+'%,'+hsl.l+'%)';
    document.getElementById('color-preview').style.background=hex;
  }
  function updateFromHSL(){
    var val=document.getElementById('hsl-input').value.trim();
    var m=val.match(/hsl\(\s*(\d+)\s*,\s*(\d+)%\s*,\s*(\d+)%\s*\)/);
    if(!m)return;var h=parseInt(m[1]),s=parseInt(m[2]),l=parseInt(m[3]);
    if(h>360||s>100||l>100)return;
    var rgb=hslToRgb(h,s,l);
    var hex='#'+rgb.r.toString(16).padStart(2,'0')+rgb.g.toString(16).padStart(2,'0')+rgb.b.toString(16).padStart(2,'0');
    document.getElementById('hex-input').value=hex;document.getElementById('color-picker').value=hex;
    document.getElementById('rgb-input').value='rgb('+rgb.r+','+rgb.g+','+rgb.b+')';
    document.getElementById('color-preview').style.background=hex;
  }
  </script>
</body>
</html>
