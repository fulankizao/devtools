<div class="tool-page"><h1>JSON ↔ YAML Converter</h1><p class="subtitle">Convert between JSON and YAML formats. Simple conversion for configuration files.</p>

<option value="j2y">JSON → YAML</option><option value="y2j">YAML → JSON</option></select></label></div></div>

<script>
function obj2yaml(obj,d){d=d||0;var pad='  '.repeat(d);var out='';if(Array.isArray(obj)){obj.forEach(function(v){var k=typeof v==='object'&&v!==null;out+=pad+'- '+(k?'\n'+obj2yaml(v,d+1):v+'\n');});}else if(obj&&typeof obj==='object'){Object.keys(obj).forEach(function(k){var v=obj[k];var kv=typeof v==='object'&&v!==null;out+=pad+k+':'+(kv?'\n'+obj2yaml(v,d+1):' '+v+'\n');});}else{out+=String(obj);}return out;}
function convJY(){var i=document.getElementById('jyi').value.trim();var d=document.getElementById('jy-dir').value;var o=document.getElementById('jyo');
if(!i){o.textContent='Please enter input.';return;}
try{if(d==='j2y'){var p=JSON.parse(i);o.textContent=obj2yaml(p).trim();o.className='output-box';}else{var lines=i.split('\n');o.textContent=JSON.stringify(parseYAML(i),null,2);o.className='output-box';}}catch(e){o.textContent='Error: '+e.message;o.className='output-box error';}}
function parseYAML(s){var obj={};s.split('\n').forEach(function(l){var m=l.match(/^\s*(\S+):\s*(.*)/);if(m)obj[m[1]]=m[2]||null;});return obj;}
function copyJY(){var t=document.getElementById('jyo').textContent;if(!t||t==='Enter input...'||t.startsWith('Error'))return;navigator.clipboard.writeText(t);}
function clrJY(){document.getElementById('jyi').value='';document.getElementById('jyo').textContent='Enter input and click Convert.';}
</script></body></html>
