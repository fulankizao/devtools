<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Formatter — Free Online DevTool</title><meta name="description" content="Format and beautify SQL queries online. Supports SELECT, INSERT, UPDATE, DELETE, CREATE statements. No upload required.">
<link rel="canonical" href="https://fulankizao.github.io/devtools/sql-formatter.html"><link rel="stylesheet" href="style.css">
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"SQL Formatter","url":"https://fulankizao.github.io/devtools/sql-formatter.html","applicationCategory":"DeveloperApplication"}</script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙</text></svg>"></head>
<body><header class="site-header"><div class="container"><a href="/devtools/" class="logo">Dev<span>Tools</span></a><nav><a href="index.html">All Tools</a></nav></div></header>
<div class="tool-page"><h1>SQL Formatter &amp; Beautifier</h1><p class="subtitle">Format SQL queries for readability. Supports all major SQL dialects.</p>
<div class="tool-box"><label for="si">SQL Query</label><textarea id="si" class="code-input" placeholder="Paste your SQL query here..." style="min-height:200px;">SELECT id, name, email FROM users WHERE active = 1 ORDER BY created_at DESC LIMIT 10</textarea>
<div class="tool-actions"><button class="btn btn-primary" onclick="fmtSQL()">Format SQL</button><button class="btn btn-danger" onclick="clrSQL()">Clear</button></div>
<label>Formatted SQL</label><div id="so" class="output-box" style="min-height:150px;font-family:var(--mono);font-size:0.8rem;"></div>
<div class="tool-actions"><button class="btn btn-sm" onclick="copySQL()">Copy</button></div></div>
<div class="related-links-box"><div class="related-links" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:0.85rem;">
<a href="json-formatter.html">JSON Formatter</a><a href="xml-formatter.html">XML Formatter</a><a href="csv-json.html">CSV/JSON</a></div></div></div>
<footer class="site-footer"><div class="container"><p>&copy; 2026 DevTools</p></div></footer>
<script>
function fmtSQL(){var s=document.getElementById('si').value;var o=document.getElementById('so');
if(!s.trim()){o.textContent='Please enter a SQL query.';return;}
var r=s.replace(/\b(SELECT|FROM|WHERE|AND|OR|ORDER BY|GROUP BY|HAVING|LIMIT|OFFSET|JOIN|LEFT JOIN|RIGHT JOIN|INNER JOIN|OUTER JOIN|ON|INSERT INTO|VALUES|UPDATE|SET|DELETE|CREATE TABLE|ALTER TABLE|DROP TABLE|INDEX|UNIQUE|PRIMARY KEY|FOREIGN KEY|REFERENCES|CASCADE|NOT NULL|DEFAULT|IN|BETWEEN|LIKE|IS NULL|IS NOT NULL|AS|DISTINCT|COUNT|SUM|AVG|MIN|MAX|UNION|ALL|EXISTS|CASE|WHEN|THEN|ELSE|END)\b/gi,function(m){return '\n  '+m.toUpperCase();});
r=r.replace(/\s*,\s*/g,',\n  ').replace(/\s*\(/g,'(\n').replace(/\)\s*/g,'\n)').replace(/'([^']*)'/g,"'$1'");
r=r.replace(/\n\s*\n/g,'\n').trim();
o.textContent=r;o.className='output-box';}
function clrSQL(){document.getElementById('si').value='';document.getElementById('so').textContent='';}
function copySQL(){var t=document.getElementById('so').textContent;if(!t)return;navigator.clipboard.writeText(t);}
</script></body></html>
