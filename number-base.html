<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Base Converter — Free Online DevTool</title>
<meta name="description" content="Convert numbers between binary (base 2), octal (base 8), decimal (base 10), and hexadecimal (base 16).">
<link rel="canonical" href="https://fulankizao.github.io/devtools/number-base.html">
<link rel="stylesheet" href="style.css">
<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Number Base Converter","url":"https://fulankizao.github.io/devtools/number-base.html","applicationCategory":"DeveloperApplication"}</script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙</text></svg>"></head>
<body>
<header class="site-header"><div class="container"><a href="/devtools/" class="logo">Dev<span>Tools</span></a><nav><a href="index.html">All Tools</a></nav></div></header>
<div class="tool-page">
<h1>Number Base Converter</h1>
<p class="subtitle">Convert numbers between binary, octal, decimal, and hexadecimal.</p>
<div class="tool-box">
<label for="ni">Input Number</label>
<input type="text" id="ni" placeholder="Enter a number..." oninput="convertNum()" style="font-family:var(--mono);">
<div class="options-row" style="margin-top:8px;">
<label>From: <select id="from-base" onchange="convertNum()" style="margin-left:4px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;">
<option value="2">Binary (base 2)</option><option value="8">Octal (base 8)</option><option value="10" selected>Decimal (base 10)</option><option value="16">Hex (base 16)</option>
</select></label>
</div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
<div class="tool-box"><label>Binary</label><input type="text" id="r-bin" readonly style="font-family:var(--mono);" onclick="this.select();navigator.clipboard.writeText(this.value);"></div>
<div class="tool-box"><label>Octal</label><input type="text" id="r-oct" readonly style="font-family:var(--mono);" onclick="this.select();navigator.clipboard.writeText(this.value);"></div>
<div class="tool-box"><label>Decimal</label><input type="text" id="r-dec" readonly style="font-family:var(--mono);" onclick="this.select();navigator.clipboard.writeText(this.value);"></div>
<div class="tool-box"><label>Hexadecimal</label><input type="text" id="r-hex" readonly style="font-family:var(--mono);" onclick="this.select();navigator.clipboard.writeText(this.value);"></div>
</div>
<div class="related-links-box"><div class="related-links" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:0.85rem;">
<a href="hex.html">HEX Encode</a><a href="color-converter.html">Color Converter</a><a href="base64.html">Base64</a>
</div></div>
</div>
<footer class="site-footer"><div class="container"><p>&copy; 2026 DevTools</p></div></footer>
<script>
function convertNum(){var v=document.getElementById('ni').value.trim();var b=parseInt(document.getElementById('from-base').value);
if(!v){document.querySelectorAll('[id^="r-"]').forEach(function(el){el.value='';});return;}
var n=parseInt(v,b);if(isNaN(n)){document.querySelectorAll('[id^="r-"]').forEach(function(el){el.value='Error';});return;}
document.getElementById('r-bin').value=n.toString(2);document.getElementById('r-oct').value=n.toString(8);
document.getElementById('r-dec').value=n.toString(10);document.getElementById('r-hex').value=n.toString(16).toUpperCase();
}
</script>
</body>
</html>
